name: Analytics CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ─── 1. Lint ───────────────────────────────────────────────────────────────
  lint:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install flake8
        run: pip install flake8

      - name: Lint — critical errors only
        run: |
          flake8 . \
            --exclude=.git,__pycache__,.ipynb_checkpoints \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics
          echo "✔ Lint passed"

  # ─── 2. Validate imports ──────────────────────────────────────────────────
  validate-imports:
    name: Validate Analytics Imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install core analytics dependencies
        run: |
          pip install \
            pandas==3.0.3 \
            numpy==2.4.6 \
            scipy==1.17.1 \
            statsmodels==0.14.6 \
            scikit-learn==1.8.0 \
            pingouin==0.6.1 \
            plotly==6.7.0 \
            matplotlib==3.10.9 \
            seaborn==0.13.2

      - name: Validate all analytics imports
        run: |
          python3 -c "
          import pandas as pd
          import numpy as np
          from scipy import stats
          import statsmodels.api as sm
          from sklearn.linear_model import LinearRegression
          import pingouin as pg
          import plotly.express as px
          import matplotlib.pyplot as plt
          import seaborn as sns
          print('✔ All analytics imports OK')
          "

  # ─── 3. Validate notebooks structure ─────────────────────────────────────
  validate-notebooks:
    name: Validate Notebooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install nbformat
        run: pip install nbformat

      - name: Check notebooks are valid JSON + have cells
        run: |
          python3 -c "
          import nbformat, glob, sys
          notebooks = glob.glob('notebooks/*.ipynb')
          if not notebooks:
              print('No notebooks found — skipping')
              sys.exit(0)
          errors = []
          for path in sorted(notebooks):
              try:
                  nb = nbformat.read(path, as_version=4)
                  nbformat.validate(nb)
                  print(f'  ✔ {path} ({len(nb.cells)} cells)')
              except Exception as e:
                  errors.append(f'  ✗ {path}: {e}')
          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          print('✔ All notebooks valid')
          "

  # ─── 4. Validate Streamlit app syntax ────────────────────────────────────
  validate-streamlit:
    name: Validate Streamlit App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install streamlit plotly pandas numpy

      - name: Check streamlit_app.py syntax
        run: |
          python3 -m py_compile dashboards/streamlit_app.py
          echo "✔ streamlit_app.py syntax OK"

  # ─── 5. Validate run_notebook.py syntax ──────────────────────────────────
  validate-runner:
    name: Validate run_notebook.py
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check syntax
        run: |
          python3 -m py_compile scripts/run_notebook.py
          echo "✔ run_notebook.py syntax OK"