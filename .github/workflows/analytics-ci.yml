name: Analytics CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-analytics:
    name: Validate Analytics Code
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install \
            pandas==2.1.3 \
            numpy==1.26.2 \
            scipy==1.11.4 \
            statsmodels==0.14.1 \
            flake8

      - name: Lint Python
        run: |
          flake8 . \
            --count \
            --select=E9,F63,F7,F82 \
            --show-source \
            --statistics
          echo "✔ Analytics lint passed"

      - name: Validate stats imports
        run: |
          python3 -c "
          import pandas as pd
          import numpy as np
          from scipy import stats
          import statsmodels.api as sm
          print('✔ All analytics imports OK')
          "